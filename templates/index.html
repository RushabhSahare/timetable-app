<!DOCTYPE html>
<html>
<head>
    <title>Weekly Timetable</title>
</head>
<body>
    <h1>Weekly Timetable</h1>

    <!-- Add Form -->
    <form method="POST" action="/add">
        <label for="time">Time:</label>
        <input type="text" id="time" name="time" required>

        <label for="day">Day:</label>
        <select id="day" name="day" required>
            {% for d in days %}
                <option value="{{ d }}">{{ d }}</option>
            {% endfor %}
        </select>

        <label for="activity">Activity:</label>
        <input type="text" id="activity" name="activity" required>

        <button type="submit">Add</button>
    </form>

    <br><br>

    <!-- Timetable Table -->
    <table border="1" cellpadding="10">
        <tr>
            <th>Time</th>
            {% for d in days %}
                <th>{{ d }}</th>
            {% endfor %}
        </tr>
        {% for time, schedule in timetable.items() %}
        <tr>
            <td>{{ time }}</td>
            {% for d in days %}
                <td>
                    {{ schedule.get(d, "") }}
                    {% if schedule.get(d) %}
                        <!-- Edit Form -->
                        <form method="POST" action="/edit/{{ time }}/{{ d }}" style="display:inline;">
                            <input type="text" name="activity" value="{{ schedule.get(d) }}" required>
                            <button type="submit">Edit</button>
                        </form>
                        <!-- Delete Form -->
                        <form method="POST" action="/delete/{{ time }}/{{ d }}" style="display:inline;">
                            <button type="submit">Delete</button>
                        </form>
                    {% endif %}
                </td>
            {% endfor %}
        </tr>
        {% endfor %}
    </table>
</body>
</html>

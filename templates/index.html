<table border="1" cellpadding="10">
    <tr>
        <th>Time</th>
        {% for d in days %}
            <th>{{ d }}</th>
        {% endfor %}
    </tr>
    {% for time, schedule in timetable.items() %}
    <tr>
        <td>{{ time }}</td>
        {% for d in days %}
            <td>
                {{ schedule.get(d, "") }}
                {% if schedule.get(d) %}
                    <!-- Edit Form -->
                    <form method="POST" action="/edit/{{ time }}/{{ d }}" style="display:inline;">
                        <input type="text" name="activity" placeholder="New activity" required>
                        <button type="submit">Edit</button>
                    </form>
                    <!-- Delete Form -->
                    <form method="POST" action="/delete/{{ time }}/{{ d }}" style="display:inline;">
                        <button type="submit">Delete</button>
                    </form>
                {% endif %}
            </td>
        {% endfor %}
    </tr>
    {% endfor %}
</table>
